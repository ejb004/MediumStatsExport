<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Medium Stats Export</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <header>
      <div class="header-left">
        <img id="avatar" class="avatar hidden" src="" alt="">
        <div>
          <div class="app-name">Medium Stats Export</div>
          <div id="username" class="username hidden"></div>
        </div>
      </div>
      <button id="settings-toggle" class="icon-btn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
          <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.858 2.929 2.929 0 0 1 0 5.858z"/>
        </svg>
      </button>
    </header>

    <div class="date-strip">
      <button class="pill" data-val="7d">Week</button>
      <button class="pill" data-val="30d">Month</button>
      <button class="pill" data-val="6m">6 months</button>
      <button class="pill" data-val="1y">Year</button>
      <button class="pill active" data-val="all">All time</button>
    </div>

    <div id="settings-panel" class="settings-panel hidden">
      <label class="toggle-row">
        <input type="checkbox" id="include-zero">
        <span class="toggle-label">Include zero-activity days</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="split-membership">
        <span class="toggle-label">Separate member / non-member columns</span>
      </label>
      <label class="toggle-row" id="csv-toggle-row">
        <input type="checkbox" id="export-csv">
        <span class="toggle-label">Also export flat CSV</span>
      </label>
    </div>

    <main id="main">

      <div id="mode-none" class="mode-panel hidden">
        <div class="empty-state">
          <div class="empty-icon">📊</div>
          <p>Open your <strong>Medium Stats</strong> page to get started.</p>
          <a class="open-link" href="https://medium.com/me/stats" target="_blank">Go to Medium Stats →</a>
        </div>
      </div>

      <div id="mode-all" class="mode-panel hidden">
        <div class="mode-meta">
          <span class="mode-badge">All stories</span>
          <span id="story-count" class="story-count"></span>
        </div>
        <button id="export-all-btn" class="primary-btn">Export All Stories</button>
      </div>

      <div id="mode-single" class="mode-panel hidden">
        <div class="mode-meta">
          <span class="mode-badge">Single story</span>
        </div>
        <div id="story-title" class="story-title"></div>
        <div class="single-btns">
          <button id="export-single-xlsx-btn" class="primary-btn">Export as Excel</button>
          <button id="export-single-csv-btn" class="secondary-btn">CSV</button>
        </div>
      </div>

      <div id="warning-area" class="warning hidden"></div>

      <div id="progress-area" class="progress-area hidden">
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="progress-meta">
          <span id="progress-text">Preparing...</span>
          <span id="progress-eta"></span>
        </div>
      </div>

      <div id="error-area" class="error-area hidden"></div>

      <div id="result-summary" class="result-summary hidden"></div>

    </main>

    <div id="last-export" class="last-export hidden"></div>

    <footer>
      <a href="https://ko-fi.com/ethanbeddard" target="_blank" class="kofi-link">☕ Support this tool</a>
    </footer>

  </div>

  <script src="lib/jszip.min.js"></script>
  <script src="lib/xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
